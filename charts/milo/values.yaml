replicaCount: 1

image:
  repository: milo-guide-scraper
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 50056

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

env:
  SERVICE_NAME: milo-guide-scraper
  SERVICE_VERSION: 0.1.0
  GRPC_PORT: "50056"
  JUDY_GRPC_TARGET: judy-council.governance-zone.svc.cluster.local:50052
  JUDY_TIMEOUT_SECONDS: "10"
  OUTBOUND_SIGNATURE_HEADER: X-Milo-Signature
  OUTBOUND_KEY_ID: milo-k1
  GUIDE_SOURCE: web
  SCRAPE_DB_PATH: /data/milo.sqlite3

secretEnv:
  OUTBOUND_SIGNATURE_SECRET: milo-dev-secret

networkPolicy:
  enabled: true
  governanceNamespace: governance-zone
  governancePodLabel: judy-council
