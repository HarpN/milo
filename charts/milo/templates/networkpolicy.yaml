{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "milo.fullname" . }}-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "milo.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app: milo-guide-scraper
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.governanceNamespace | quote }}
          podSelector:
            matchLabels:
              app: {{ .Values.networkPolicy.governancePodLabel | quote }}
      ports:
        - protocol: TCP
          port: 50052
{{- end }}
